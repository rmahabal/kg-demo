<style>
:root{--green:#16a34a;--green-600:#15803d;--teal:#0d9488;--lime:#84cc16;--ink:#0f1c19;--slate:#334155;--muted:#5b6776;--faint:#94a3b8;--bg:#eef2f0;--surface:#ffffff;--surface2:#f5f8f6;--line:#dde4e1;--amber:#d97706;--sky:#0284c7;--purple:#7c3aed;--indigo:#6366f1;--edge:#c2ccc7;--radius:12px;}
html.dark{--ink:#e6edf3;--slate:#c2ccd6;--muted:#94a3b8;--faint:#5b6b78;--bg:#080c0e;--surface:#0f1418;--surface2:#0c1115;--line:#1d272c;--green:#34d399;--teal:#2dd4bf;--lime:#a3e635;--edge:#2a363c;}
*{box-sizing:border-box}
body{margin:0;font-family:Mulish,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px}
.top{display:flex;align-items:center;gap:14px;padding:13px 22px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:6}
.logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--green),var(--teal));display:grid;place-items:center;color:#fff;font-weight:800}
.ttl{font-weight:800;letter-spacing:-.3px}.sub{font-size:11.5px;color:var(--muted);font-weight:600}
.spacer{flex:1}
.search{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;background:var(--surface2);padding:7px 12px;min-width:240px}
.search input{border:none;background:transparent;outline:none;color:var(--ink);font-family:Mulish;font-size:13px;font-weight:600;width:100%}
.theme{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--surface);cursor:pointer;color:var(--slate)}
.layout{display:grid;grid-template-columns:200px 1fr 270px;gap:0;height:calc(100vh - 56px)}
.panel{padding:16px;overflow-y:auto}
.left{border-right:1px solid var(--line);background:var(--surface)}
.right{border-left:1px solid var(--line);background:var(--surface)}
.stage{position:relative;display:flex;flex-direction:column}
.bar{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--surface2);font-size:12px}
.crumbs{display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex:1;min-width:0}
.crumb{font-weight:700;color:var(--teal);cursor:pointer;white-space:nowrap}
.crumb:hover{text-decoration:underline}
.crumb.cur{color:var(--ink);cursor:default;text-decoration:none}
.crumb-sep{color:var(--faint)}
.counter{color:var(--muted);font-weight:600;white-space:nowrap}
.btn{font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:var(--surface);cursor:pointer;color:var(--slate)}
.btn:hover{background:var(--surface2)}
svg.gv{flex:1;width:100%;height:100%;display:block}
.lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin:2px 0 9px}
.kf{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:600}
.kf:hover{background:var(--surface2)}
.kf .dot{width:10px;height:10px;border-radius:3px;flex:none}
.kf .nm{flex:1}.kf .ct{font-size:11px;color:var(--faint);font-weight:700}
.kf.off{opacity:.4}
.kf.off .nm{text-decoration:line-through}
.toggle{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12.5px;font-weight:600;cursor:pointer}
.sw{width:36px;height:20px;border-radius:999px;background:var(--green);position:relative;flex:none}
.sw.off{background:var(--line)}.sw i{position:absolute;top:2px;left:18px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.18s}.sw.off i{left:2px}
/* svg styling */
.edge{stroke:var(--edge);stroke-width:1.5;fill:none}
.gnode{cursor:pointer}
.gnode circle{stroke-width:2;transition:.15s}
.gnode text{font-family:Mulish;text-anchor:middle;pointer-events:none}
.gnode .nl{font-size:10.5px;font-weight:800}
.gnode .ns{font-size:9.5px;font-weight:600;fill:var(--muted)}
.gnode.center circle{r:42}
.gnode:hover circle{filter:drop-shadow(0 3px 8px rgba(13,148,136,.4))}
.cluster circle{stroke-dasharray:5 4;fill:var(--surface2)!important}
.cluster .cx{font-size:13px;font-weight:900;fill:var(--slate)}
.elab{font-size:9.5px;fill:var(--faint);font-weight:700;text-anchor:middle;font-family:Mulish}
.nf-ring{fill:none;stroke:var(--amber);stroke-width:2;stroke-dasharray:3 3}
/* detail */
.dt{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.dn{font-size:16px;font-weight:800;margin:6px 0 2px;word-break:break-word}
.dk{font-size:12px;font-weight:700}
.drow{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:7px 0;border-bottom:1px solid var(--line)}
.drow .k{color:var(--muted);font-weight:600}.drow .v{font-weight:700;text-align:right;word-break:break-word}
.note{font-size:11.5px;color:var(--muted);background:var(--surface2);border:1px dashed var(--line);border-radius:8px;padding:10px 12px;line-height:1.5;margin-top:14px}
.note b{color:var(--slate)}
.mlist{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.mrow{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:var(--surface2);cursor:pointer;font-size:12px;font-weight:600}
.mrow:hover{border-color:var(--teal)}
.mrow .md{width:8px;height:8px;border-radius:2px;flex:none}
.mrow .mn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cta{display:inline-flex;width:100%;justify-content:center;align-items:center;gap:8px;font-weight:700;font-size:12.5px;color:#fff;background:linear-gradient(135deg,var(--green),var(--teal));border:none;padding:9px 14px;border-radius:9px;cursor:pointer;margin-top:12px}
@media(max-width:1000px){.layout{grid-template-columns:1fr}.left,.right{display:none}}
</style></head><body>

// filters
function kfilters(){
  var counts={}; Object.values(G.nodes).forEach(function(n){counts[n.k]=(counts[n.k]||0)+1;});
  var order=['inst','prod','feat','price','disc','doc','pol','rule','auth','cons','offer','seg','chan','oblig','src'];
  var el=document.getElementById('kfilters');
  el.innerHTML=order.filter(function(k){return counts[k];}).map(function(k){
    return '<div class="kf" data-k="'+k+'"><span class="dot" style="background:'+KCOLOR[k]+'"></span><span class="nm">'+KLABEL[k]+'</span><span class="ct">'+counts[k]+'</span></div>';
  }).join('');
  el.querySelectorAll('.kf').forEach(function(f){f.addEventListener('click',function(){
    var k=f.dataset.k; hidden[k]=!hidden[k]; f.classList.toggle('off',hidden[k]); render();});});
}
// search
function searchInit(){
  var dl=document.getElementById('nodelist');
  dl.innerHTML=Object.values(G.nodes).map(function(n){return '<option value="'+esc(n.name)+'::'+n.id+'">';}).join('');
  var inp=document.getElementById('search');
  inp.addEventListener('change',function(){
    var v=inp.value; var id=v.indexOf('::')>=0?v.split('::')[1]:null;
    if(!id){var hit=Object.values(G.nodes).find(function(n){return n.name===v;});id=hit&&hit.id;}
    if(id&&G.nodes[id]){centerOn(id);inp.value='';}
  });
}
function nftoggle(){var t=document.getElementById('nftoggle');t.addEventListener('click',function(){
  nfOnly=!nfOnly; t.querySelector('.sw').classList.toggle('off',!nfOnly); render();});}
document.getElementById('back').addEventListener('click',function(){if(crumbs.length){center=crumbs.pop();render();}});
document.getElementById('theme').addEventListener('click',function(){var d=document.documentElement.classList.toggle('dark');try{localStorage.setItem('kg-theme',d?'dark':'light');}catch(e){}});
function esc(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function trim(s,n){s=s+'';return s.length<=n?s:s.slice(0,n-1)+'…';}
kfilters(); searchInit(); nftoggle(); render();
</script>
</body></html>
